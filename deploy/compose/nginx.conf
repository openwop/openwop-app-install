# nginx edge for the vendor-neutral compose pack.
#
# Serves the built SPA and reverse-proxies /api to the backend container.
# The single most important detail: `/api` runs with proxy_buffering OFF so
# Server-Sent Events (run streams) are delivered token-by-token. A buffering
# edge breaks OpenWOP's long-lived event streams — this is the same SSE hazard
# the GCP pack documents (there it forces a direct Cloud Run origin; here nginx
# simply doesn't buffer, so the SPA can use a single same-origin /api).

server {
    listen       80;
    server_name  _;

    # Built SPA assets.
    root   /usr/share/nginx/html;
    index  index.html;

    # Match the backend's largest body limit (50mb on /v1/packs publishes; 12mb
    # on media). A lower cap here would 413 large pack publishes before they
    # reach the backend.
    client_max_body_size 50m;

    # ── API + SSE proxy ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming correctness: never buffer, never time the stream out.
        proxy_buffering        off;
        proxy_cache            off;
        proxy_set_header       Connection '';
        chunked_transfer_encoding off;
        proxy_read_timeout     1h;
        proxy_send_timeout     1h;
    }

    # ── SPA fallback (client-side routing) ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
