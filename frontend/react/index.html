<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Apply the saved theme override (DESIGN.md §3) before first paint so
         a forced light/dark choice doesn't flash. If unset, use the stamped
         VITE_BRAND_DEFAULT_THEME; 'system' leaves the @media
         (prefers-color-scheme) default in charge. ThemeToggle keeps
         localStorage in sync at runtime. -->
    <script>
      try {
        var d = '{{BRAND_DEFAULT_THEME}}';
        var bt = JSON.parse(localStorage.getItem('openwop.brand') || '{}');
        var defMode = (bt.theme && bt.theme.defaultMode) || d; // runtime brand default overrides the build-time one
        var t = localStorage.getItem('openwop.theme') || defMode;
        if (t === 'dark') document.documentElement.classList.add('theme-dark');
        else if (t === 'light') document.documentElement.classList.add('theme-light');
        // ADR 0170 — pre-paint the cached runtime brand (super-admin override) so a
        // re-branded install paints its colors/title/favicon with no flash. The
        // BrandProvider refreshes this from /public-brand after load.
        // MIRROR: the `map` below duplicates COLOR_TOKEN in src/brand/applyBrand.ts
        // (this inline script runs before the bundle, so it can't import it) — keep
        // both in sync per the mirror contract on PublicBrandIdentity.
        var b = bt;
        var r = document.documentElement, c = b.colors || {};
        var map = { accent: '--clay', paper: '--paper', paper2: '--paper-2', ink: '--ink', ink2: '--ink-2', rule: '--rule' };
        for (var k in map) if (c[k]) r.style.setProperty(map[k], c[k]);
        // ADR 0171 — apply the cached GENERATED token maps (light + dark) via a style
        // element so a custom theme paints with no flash. MIRROR: duplicates
        // applyGeneratedTokens() in src/brand/applyBrand.ts (this runs before the bundle).
        try {
          var tk = JSON.parse(localStorage.getItem('openwop.brand.tokens') || 'null');
          if (tk && (tk.light || tk.dark)) {
            var safe = /^[^;{}<>]+$/;
            var mk = function (sel, m) {
              var s = '';
              for (var k2 in (m || {})) if (k2.indexOf('--') === 0 && typeof m[k2] === 'string' && safe.test(m[k2])) s += k2 + ':' + m[k2] + ';';
              return s ? sel + '{' + s + '}' : '';
            };
            var st = document.createElement('style');
            st.id = 'openwop-brand-theme';
            st.textContent = mk(':root', tk.light) + mk(':root.theme-dark', tk.dark);
            document.head.appendChild(st);
          }
        } catch (e2) {}
        if (b.documentTitle || b.productName) document.title = b.documentTitle || b.productName;
        var fav = b.logo && b.logo.faviconSrc;
        if (fav) { var li = document.querySelector('link[rel="icon"]'); if (li) li.setAttribute('href', fav); }
      } catch (e) {}
    </script>
    <!-- The title / favicon / fonts placeholders below are stamped at
         build time by the `openwop-brand-html` Vite plugin from
         `VITE_BRAND_*` env (defaults in src/brand/defaults.ts). See
         WHITE-LABEL.md — do not hard-code brand values here. -->
    <title>{{BRAND_TITLE}}</title>
    <link rel="icon" type="image/svg+xml" href="{{BRAND_FAVICON}}" />
    <!-- PWA install + mobile chrome. The manifest is emitted at build time by
         the `openwop-brand-html` Vite plugin (name/theme-color/icon from
         `VITE_BRAND_*`); theme-color + apple-touch-icon are stamped here. See
         WHITE-LABEL.md — override via VITE_BRAND_THEME_COLOR / VITE_BRAND_FAVICON_SRC. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="{{BRAND_THEME_COLOR}}" />
    <link rel="apple-touch-icon" href="{{BRAND_FAVICON}}" />

    <!-- Fonts — the app's brand type triple: Instrument Serif + Geist + Geist
         Mono (DESIGN.md §2). Override per-deploy with VITE_BRAND_FONTS_HREF. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="{{BRAND_FONTS_HREF}}" />

    <link rel="stylesheet" href="/src/styles/global.css" />
    <!-- White-label override layer — loads AFTER global.css so its tokens
         win the cascade without editing the synced editorial palette. -->
    <link rel="stylesheet" href="/src/brand/brand.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
